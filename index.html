<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />

      name="viewport"

    <title>친해집시다!!</title>
    <link
      rel="stylesheet"
      as="style"

    <style>
      :root {
        --bg: #fbf9fa;
        --header-pink: #ffc7c2;
        --body-pink: #ffefeb;
        --button-pink: #f56172;
        --text: #111111;
        --berry: #f1bbb6;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
          sans-serif;
      }

      body {
        display: flex;
        justify-content: center;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      .app {
        position: relative;
        width: min(100%, 430px);
        min-height: 100vh;
        overflow-x: hidden;
        padding: 22px 16px 38px;
      }

      .status-bar-space {
        height: 40px;
      }

      .title {
        margin: 44px 0 98px;
        text-align: center;
        font-size: 30px;
        line-height: 1.2;
        font-weight: 800;
        letter-spacing: -0.03em;
      }

      .decor {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 0;
      }

      .strawberry {
        position: absolute;
        color: var(--berry);
        opacity: 0.84;
      }

      .strawberry svg {
        display: block;
        width: 100%;
        height: 100%;
      }

.berry-top-left {
  top: 250px;
  left: 28px;
  width: 110px;
  height: 110px;
  transform: rotate(-12deg);
}

.berry-top-right {
  top: 256px;
  right: -92px;
  width: 252px;
  height: 252px;
  transform: rotate(22deg);
}

.berry-bottom-left {
  bottom: 292px;
  left: -76px;
  width: 190px;
  height: 190px;
  transform: rotate(18deg);
}

.berry-bottom-right {
  bottom: 182px;
  right: 22px;
  width: 132px;
  height: 132px;
  transform: rotate(18deg);
}


      .content {
        position: relative;
        z-index: 1;
      }

      .card-wrap {
        position: relative;
      }

      .question-card {
        border-radius: 34px;
        overflow: hidden;
      }

      .card-header {
        min-height: 163px;
        background: var(--header-pink);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 30px 36px;
        text-align: center;
      }

      .card-header h1 {
        margin: 0;
        max-width: 318px;
        font-size: 30px;
        line-height: 1.28;
        font-weight: 800;
        letter-spacing: -0.045em;
        word-break: keep-all;
      }

      .card-body {
        background: var(--body-pink);
        padding: 74px 26px 84px;
      }

      .question-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 82px;
      }

      .question-list li {
        margin: 0 auto;
        max-width: 302px;
        text-align: center;
        font-size: 24px;
        line-height: 1.74;
        font-weight: 700;
        letter-spacing: -0.05em;
        word-break: keep-all;
      }

      .card-animating {
        animation: cardSwap 360ms ease;
      }

      @keyframes cardSwap {
        0% {
          opacity: 0;
          transform: translateY(12px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .button-wrap {
        margin-top: 86px;
      }

      .next-button {
        width: 100%;
        min-height: 82px;
        border: 0;
        border-radius: 999px;
        background: var(--button-pink);
        color: #ffffff;
        font-size: 27px;
        line-height: 1.2;
        font-weight: 800;
        letter-spacing: -0.04em;
        cursor: pointer;
        transition: transform 120ms ease, background-color 120ms ease;
        -webkit-tap-highlight-color: transparent;
      }

      .next-button:active {
        transform: scale(0.985);
      }

      .next-button:focus-visible {
        outline: 3px solid rgba(245, 97, 114, 0.26);
        outline-offset: 4px;
      }

      @media (max-width: 390px) {
        .app {
          padding-left: 16px;
          padding-right: 16px;
        }

        .title {
          margin-top: 40px;
          margin-bottom: 94px;
          font-size: 29px;
        }

        .card-header h1 {
          font-size: clamp(27px, 7.6vw, 30px);
        }

        .question-list li {
          font-size: clamp(22px, 6.15vw, 24px);
        }

        .berry-top-right {
          right: -88px;
        }
      }
    </style>
  </head>

          subQuestions: [
            "바로 고르실 수 있으신가요?",
            "인생에서 더 중요한 것은 돈이라고 생각하시나요, 시간이라고 생각하시나요?"
          ]
        },
        {
          id: 25,
          mainQuestion: "🧥 여름에 겨울옷 vs 겨울에 여름옷",
          subQuestions: [
            "왜 그 선택이 더 낫다고 느끼시나요?",
            "추위를 더 잘 버티시나요, 더위를 더 잘 버티시나요?"
          ]
        }
      ];

      const mainQuestionElement = document.getElementById("mainQuestion");
      const subQuestionsElement = document.getElementById("subQuestions");
      const questionCardElement = document.getElementById("questionCard");
      const nextButtonElement = document.getElementById("nextButton");

      let currentQuestionId = null;

      function getRandomQuestion(questions, previousId) {
        if (questions.length === 1) {
          return questions[0];
        }

        let nextQuestion = null;
        do {
          const randomIndex = Math.floor(Math.random() * questions.length);
          nextQuestion = questions[randomIndex];
        } while (nextQuestion.id === previousId);

        return nextQuestion;
      }

      function renderQuestion(question) {
        mainQuestionElement.textContent = question.mainQuestion;
        subQuestionsElement.innerHTML = "";

        question.subQuestions.forEach((subQuestion) => {
          const listItem = document.createElement("li");
          listItem.textContent = subQuestion;
          subQuestionsElement.appendChild(listItem);
        });

        questionCardElement.classList.remove("card-animating");
        void questionCardElement.offsetWidth;
        questionCardElement.classList.add("card-animating");
      }

      function showNextQuestion() {
        const nextQuestion = getRandomQuestion(QUESTIONS, currentQuestionId);
        currentQuestionId = nextQuestion.id;
        renderQuestion(nextQuestion);
      }

      nextButtonElement.addEventListener("click", showNextQuestion);

      showNextQuestion();
    </script>
  </body>
</html>
